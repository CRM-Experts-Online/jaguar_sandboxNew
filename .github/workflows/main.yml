unexpected EOF while looking for matching


Diagnosed bash quoting vulnerability and devised environment variable solution
Diagnosed bash quoting vulnerability and devised environment variable solution
That error is a shell quoting problem, and it's almost certainly coming from the echo steps in that workflow. Here's what's happening.

GitHub substitutes ${{ ... }} expressions as raw text into the shell script before bash parses it. So if a PR title (or author name, or the JSON payload) contains a quote character or apostrophe, it breaks the surrounding quotes and bash hits the end of the line still looking for a closing " or ' — hence "unexpected EOF while looking for matching."

For example, a PR titled Fix Dave's bug turns this:

yaml
echo "Title: ${{ github.event.pull_request.title }}"
into this at runtime:

bash
echo "Title: Fix Dave's bug"   # still fine here...
but the toJSON debug line wrapped in single quotes is the usual killer — any apostrophe inside the JSON closes the quote early. This is also a security hole (script injection), so the correct fix is to pass values through env: instead of interpolating them into the script:

yaml
      - name: Show merge details
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE:  ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          HEAD_REF:  ${{ github.event.pull_request.head.ref }}
          BASE_REF:  ${{ github.event.pull_request.base.ref }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
        run: |
          echo "PR #${PR_NUMBER} merged"
          echo "Title:  ${PR_TITLE}"
          echo "Author: ${PR_AUTHOR}"
          echo "From:   ${HEAD_REF}"
          echo "Into:   ${BASE_REF}"
          echo "By:     ${MERGED_BY}"
Now bash sees only ${PR_TITLE}, and the actual title lives in an environment variable where quotes and apostrophes can't break the script.

Same fix for the debug line:

yaml
      - name: Debug event payload
        env:
          PAYLOAD: ${{ toJSON(github.event.pull_request) }}
        run: echo "$PAYLOAD"
Rule of thumb
Never drop ${{ github.event... }} values directly inside a run: script — especially anything user-controlled like titles, branch names, commit messages, or issue bodies. Route them through env: and reference them as shell variables. It fixes the EOF error and closes the injection risk at the same time.

If the error is coming from a different step, paste the failing run: block (and the PR title/branch name if relevant) and I'll pinpoint the exact unmatched quote.

