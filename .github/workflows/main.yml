This involves specific SuiteCloud CLI commands and CI auth flows that Oracle changes across versions — let me verify the current approach before writing it into the file.


Searched the web
Searched the web
I have what I need. Modern SuiteCloud CLI (v3+) requires OAuth 2.0 machine-to-machine auth for CI — token-based auth was removed in NetSuite 2024.2. The flow is: install @oracle/suitecloud-cli, authenticate with account:setup:ci using a certificate + private key, then project:deploy. Here's the complete file.

yaml
# .github/workflows/on-pr-merge.yml
name: On PR Merge — Deploy to NetSuite

# A PR merge fires a `pull_request` event with action `closed`.
# There's no dedicated "merged" trigger — you filter for it with the `if` below.
on:
  pull_request:
    types: [closed]

# Least-privilege default; widen per-job only if a step needs more.
permissions:
  contents: read

jobs:
  deploy-netsuite:
    # Runs ONLY when the PR was actually merged into main, not merely closed.
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest

    # SuiteCloud CLI in CI needs these two vars set for M2M auth to be allowed.
    env:
      SUITECLOUD_CI: "1"
      SUITECLOUD_CI_PASSKEY: ${{ secrets.SUITECLOUD_CI_PASSKEY }}

    steps:
      # checkout v6 runs on Node 24 — no deprecation warning.
      - name: Check out code
        uses: actions/checkout@v6

      # SuiteCloud CLI requires a JDK to be present on the runner.
      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      # setup-node v5 also runs on Node 24.
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      # --acceptSuiteCloudSDKLicense skips the interactive license prompt in CI.
      - name: Install SuiteCloud CLI
        run: npm install -g --acceptSuiteCloudSDKLicense @oracle/suitecloud-cli

      # Log the merge context (all ${{ }} values routed through env: to avoid
      # "unexpected EOF" from quotes/apostrophes and to block script injection).
      - name: Show merge details
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE:  ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
        run: |
          echo "PR #${PR_NUMBER} merged: ${PR_TITLE}"
          echo "Author: ${PR_AUTHOR}  |  Merged by: ${MERGED_BY}"

      # The private key is stored base64-encoded in a secret so newlines survive.
      # Decode it to a file the CLI can read, with tight permissions.
      - name: Restore NetSuite private key
        env:
          NS_PRIVATE_KEY_B64: ${{ secrets.NS_PRIVATE_KEY_B64 }}
        run: |
          echo "$NS_PRIVATE_KEY_B64" | base64 --decode > "$RUNNER_TEMP/ns-private.pem"
          chmod 600 "$RUNNER_TEMP/ns-private.pem"

      # M2M / OAuth 2.0 auth. --authid must match DefaultAuthID in project.json.
      - name: Authenticate to NetSuite (M2M)
        env:
          NS_ACCOUNT_ID:     ${{ secrets.NS_ACCOUNT_ID }}
          NS_AUTH_ID:        ${{ secrets.NS_AUTH_ID }}
          NS_CERTIFICATE_ID: ${{ secrets.NS_CERTIFICATE_ID }}
        run: |
          suitecloud account:setup:ci \
            --account "$NS_ACCOUNT_ID" \
            --authid "$NS_AUTH_ID" \
            --certificateid "$NS_CERTIFICATE_ID" \
            --privatekeypath "$RUNNER_TEMP/ns-private.pem"

      # Dry-run validation against the account before deploying — fail fast.
      - name: Validate project
        run: suitecloud project:deploy --dryrun

      # Deploy the actual script/objects. This updates your script file(s) in NetSuite.
      - name: Deploy to NetSuite
        run: suitecloud project:deploy

      # Never leave the key on disk, even though the runner is ephemeral.
      - name: Clean up key
        if: always()
        run: rm -f "$RUNNER_TEMP/ns-private.pem"
What you need to set up before this runs
GitHub secrets (repo → Settings → Secrets and variables → Actions):

Secret	What it is
NS_ACCOUNT_ID	Your account ID, e.g. 1234567_SB1 for a sandbox
NS_AUTH_ID	The auth ID you chose during local account:setup:ci — must match DefaultAuthID in project.json
NS_CERTIFICATE_ID	The certificate ID NetSuite returns when you upload the public key
NS_PRIVATE_KEY_B64	Your private key, base64-encoded (base64 -w0 private.pem on Linux, base64 -i private.pem on macOS)
SUITECLOUD_CI_PASSKEY	Any secure passkey string; the CLI uses it to encrypt its credentials file
On the NetSuite side, one-time setup: enable the OAuth 2.0 and SuiteCloud Development Framework features on the account, then create an RSA certificate and map it to a user+role under the SuiteCloud Development Integration app. Two gotchas worth flagging from people who've hit them:

Use an RSA key, not an EC key. Several developers report the error with the private key failure with EC keys that goes away when they switch to RSA. Generate with something like openssl req -new -x509 -newkey rsa:4096 -keyout private.pem -sigopt rsa_padding_mode:pss -sha256 ....
The SUITECLOUD_CI and SUITECLOUD_CI_PASSKEY env vars are mandatory. Without them you get Machine-to-machine authentication is not allowed for the current execution context. They're set at the job level in the file above.
One more thing worth knowing: the default auth ID for deployment can't be changed via the CLI in a pipeline, so make sure DefaultAuthID in your project's project.json already equals whatever you put in NS_AUTH_ID.

A note on scope
"Update the script file" — if you mean deploying SuiteScript .js files plus their script/deployment records, project:deploy handles the whole SDF project (files in the File Cabinet folders plus objects in the manifest). If you only want to push files and not touch objects, suitecloud file:upload --paths /SuiteScripts/yourfile.js is the narrower command; swap it in for the deploy step.

