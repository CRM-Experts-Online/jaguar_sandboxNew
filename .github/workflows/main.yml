Here's the complete file using file:upload instead of a full project deploy. This pushes specific SuiteScript files to the File Cabinet without touching script/deployment records or other SDF objects.

yaml
# .github/workflows/on-pr-merge.yml
name: On PR Merge — Upload Files to NetSuite

# A PR merge fires a `pull_request` event with action `closed`.
# There's no dedicated "merged" trigger — you filter for it with the `if` below.
on:
  pull_request:
    types: [closed]

# Least-privilege default; widen per-job only if a step needs more.
permissions:
  contents: read

jobs:
  upload-netsuite:
    # Runs ONLY when the PR was actually merged into main, not merely closed.
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest

    # SuiteCloud CLI in CI needs these two vars set for M2M auth to be allowed.
    env:
      SUITECLOUD_CI: "1"
      SUITECLOUD_CI_PASSKEY: ${{ secrets.SUITECLOUD_CI_PASSKEY }}

    steps:
      # checkout v6 runs on Node 24 — no deprecation warning.
      - name: Check out code
        uses: actions/checkout@v6

      # SuiteCloud CLI requires a JDK to be present on the runner.
      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      # setup-node v5 also runs on Node 24.
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      # --acceptSuiteCloudSDKLicense skips the interactive license prompt in CI.
      - name: Install SuiteCloud CLI
        run: npm install -g --acceptSuiteCloudSDKLicense @oracle/suitecloud-cli

      # Log the merge context (all ${{ }} values routed through env: to avoid
      # "unexpected EOF" from quotes/apostrophes and to block script injection).
      - name: Show merge details
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE:  ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
        run: |
          echo "PR #${PR_NUMBER} merged: ${PR_TITLE}"
          echo "Author: ${PR_AUTHOR}  |  Merged by: ${MERGED_BY}"

      # The private key is stored base64-encoded in a secret so newlines survive.
      # Decode it to a file the CLI can read, with tight permissions.
      - name: Restore NetSuite private key
        env:
          NS_PRIVATE_KEY_B64: ${{ secrets.NS_PRIVATE_KEY_B64 }}
        run: |
          echo "$NS_PRIVATE_KEY_B64" | base64 --decode > "$RUNNER_TEMP/ns-private.pem"
          chmod 600 "$RUNNER_TEMP/ns-private.pem"

      # M2M / OAuth 2.0 auth. --authid must match DefaultAuthID in project.json.
      - name: Authenticate to NetSuite (M2M)
        env:
          NS_ACCOUNT_ID:     ${{ secrets.NS_ACCOUNT_ID }}
          NS_AUTH_ID:        ${{ secrets.NS_AUTH_ID }}
          NS_CERTIFICATE_ID: ${{ secrets.NS_CERTIFICATE_ID }}
        run: |
          suitecloud account:setup:ci \
            --account "$NS_ACCOUNT_ID" \
            --authid "$NS_AUTH_ID" \
            --certificateid "$NS_CERTIFICATE_ID" \
            --privatekeypath "$RUNNER_TEMP/ns-private.pem"

      # Upload specific files to the File Cabinet. Paths are the File Cabinet
      # paths as they appear in your SDF project (under the FileCabinet folder),
      # NOT local disk paths. Multiple paths are space-separated.
      - name: Upload files to NetSuite
        run: |
          suitecloud file:upload --paths \
            "/SuiteScripts/my-script.js" \
            "/SuiteScripts/lib/helpers.js"

      # Never leave the key on disk, even though the runner is ephemeral.
      - name: Clean up key
        if: always()
        run: rm -f "$RUNNER_TEMP/ns-private.pem"
Key differences from the deploy version
The deploy step is replaced by file:upload --paths, which pushes only the named files. A few things that trip people up:

The paths are File Cabinet paths, not local paths. They're rooted at your SDF project's FileCabinet folder — so a file at src/FileCabinet/SuiteScripts/my-script.js on disk is referenced as /SuiteScripts/my-script.js in the command. The file must already exist in your project's FileCabinet directory; file:upload mirrors what's on disk up to the account.

file:upload only moves file content — it does not create or update script records, deployment records, custom fields, or any other SDF object. If your PR added a new script that needs a new Script record and Script Deployment in NetSuite, file:upload alone won't wire those up; you'd need project:deploy for that first time, then file:upload for subsequent code-only changes. This is the usual pattern: deploy once to establish records, then fast file uploads for iterative script edits.

Optional: upload only the files changed in the PR
If you don't want to hardcode paths, you can derive them from the merge. Replace the upload step with something like this, which maps changed files under your File Cabinet folder to their in-project paths:

yaml
      - name: Upload changed files to NetSuite
        run: |
          # List files changed in the merge commit, keep only FileCabinet ones.
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} \
            | grep '^src/FileCabinet/' || true)

          if [ -z "$CHANGED" ]; then
            echo "No File Cabinet files changed; nothing to upload."
            exit 0
          fi

          # Strip the local prefix to get File Cabinet paths (e.g. /SuiteScripts/x.js).
          PATHS=$(echo "$CHANGED" | sed 's#^src/FileCabinet##')

          echo "Uploading:"; echo "$PATHS"
          # xargs feeds each path as a separate --paths argument.
          echo "$PATHS" | xargs suitecloud file:upload --paths
Adjust src/FileCabinet/ to match your actual project layout. Note that if you need checkout to see the base commit for the git diff, add with: { fetch-depth: 0 } to the checkout step so the full history is available.

