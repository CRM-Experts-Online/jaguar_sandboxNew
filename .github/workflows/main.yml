Here's the complete workflow file with the quoting fix applied throughout.

yaml
# .github/workflows/on-pr-merge.yml
name: On PR Merge

# A PR merge fires a `pull_request` event with action `closed`.
# There's no dedicated "merged" trigger — you filter for it with the `if` below.
on:
  pull_request:
    types: [closed]

# Least-privilege default; widen per-job only if a step needs more.
permissions:
  contents: read

jobs:
  on-merge:
    # Runs ONLY when the PR was actually merged, not merely closed.
    # Add `&& github.event.pull_request.base.ref == 'main'` to scope to one branch.
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      # v6 (or v5+) runs on Node 24 — no deprecation warning.
      - name: Check out code
        uses: actions/checkout@v6

      # setup-node@v5 is also Node 24.
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      # All ${{ }} values are passed via env: — never inlined into the script.
      # This prevents "unexpected EOF" from quotes/apostrophes AND blocks script injection.
      - name: Show merge details
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE:  ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          HEAD_REF:  ${{ github.event.pull_request.head.ref }}
          BASE_REF:  ${{ github.event.pull_request.base.ref }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
        run: |
          echo "PR #${PR_NUMBER} merged"
          echo "Title:  ${PR_TITLE}"
          echo "Author: ${PR_AUTHOR}"
          echo "From:   ${HEAD_REF}"
          echo "Into:   ${BASE_REF}"
          echo "By:     ${MERGED_BY}"

      # ---- put your real post-merge work here ----
      - name: Install and build
        run: |
          npm ci
          npm run build

      # Optional: dump the full payload while debugging, then delete.
      # Payload also routed through env: for the same safety reasons.
      # - name: Debug event payload
      #   env:
      #     PAYLOAD: ${{ toJSON(github.event.pull_request) }}
      #   run: echo "$PAYLOAD"
What changed from the earlier version: every ${{ github.event... }} expression in the run: steps now lives in an env: block and is referenced as a shell variable (${PR_TITLE}, etc.), and the debug step got the same treatment. That's the fix for the "unexpected EOF while looking for matching" error — bash never sees the raw title/branch text, so a stray quote or apostrophe can't break the script.

Two reminders for deploying it: this file has to be on your base branch (e.g. main) before the trigger will fire, and you can verify the if guard by closing a PR without merging (job should skip) versus merging one (job should run).

