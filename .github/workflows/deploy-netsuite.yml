name: Deploy to NetSuite

# develop -> sandbox, main -> production
on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Selects the GitHub Environment (and its scoped secrets).
    # Add a required-reviewers rule on the "production" environment
    # if you want a manual approval gate before prod deploys.
    environment: ${{ github.ref_name == 'main' && 'production' || 'sandbox' }}

    env:
      # Required so the CLI runs in non-interactive CI context.
      # Without this you get:
      # "Machine-to-machine authentication is not allowed for the current execution context"
      SUITECLOUD_CI: 1
      # 32-100 char string; encrypts the local credentials file the CLI writes.
      SUITECLOUD_CI_PASSKEY: ${{ secrets.SUITECLOUD_CI_PASSKEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install SuiteCloud CLI
        run: npm install -g @oracle/suitecloud-cli

      - name: Restore private key
        run: echo "${{ secrets.NS_PRIVATE_KEY_B64 }}" | base64 -d > private.pem

      - name: Authenticate to NetSuite (OAuth 2.0 M2M)
        run: |
          suitecloud account:setup:ci \
            --account "${{ secrets.NS_ACCOUNT_ID }}" \
            --authid ci \
            --certificateid "${{ secrets.NS_CERTIFICATE_ID }}" \
            --privatekeypath private.pem

      - name: Validate project (server-side)
        run: suitecloud project:validate --server

      - name: Deploy project
        run: suitecloud project:deploy

      - name: Clean up key
        if: always()
        run: rm -f private.pem
